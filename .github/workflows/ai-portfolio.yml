name: AI Portfolio Architect

on:
  push:
    paths:
      - 'incoming/**' # Only trigger when new scripts arrive from the Pi

jobs:
  build_portfolio:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows GitHub to commit the new folders

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install AI Dependencies
        run: pip install google-generativeai

      - name: Run AI Architect
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python .github/scripts/ai_architect.py

      - name: Commit and Push AI Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 AI Automated Portfolio Build: Organized script & wrote README"
